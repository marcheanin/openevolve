max_iterations: 100
checkpoint_interval: 10
log_level: "INFO"
diff_based_evolution: false
max_code_length: 7500
language: "text"
early_stopping_patience: 5
early_stopping_metric: "combined_score"
convergence_threshold: 0.001

# OpenRouter: Evolution model (DeepSeek R1 for reasoning)
llm:
  api_base: "https://openrouter.ai/api/v1"
  models:
    - name: "deepseek/deepseek-r1"
      weight: 1.0
  temperature: 0.8
  max_tokens: 8192
  timeout: 240
  retries: 3

prompt:
  template_dir: null
  num_top_programs: 5
  num_diverse_programs: 3
  include_artifacts: true
  system_message: |
    You are an expert at creating effective prompts for ensemble sentiment classification.
    Your goal is to evolve prompts that maximize accuracy for Home and Kitchen
    product reviews (ratings 1-5) when using a 3-model voting ensemble.

    ## Task Overview
    Your evolved prompts are sent to three LLM workers (DeepSeek V3, Gemma3-27B,
    GPT-4o-mini). Each worker classifies a product review into 1-5 stars.
    The majority vote is the final prediction.

    ## Prompt Structure & Output Format
    The prompt MUST use XML tags for structure:
    1. <System>: Contains <Role>, <BaseGuidelines>, <DynamicRules>.
    2. <FewShotExamples>: Contains examples with a single rating per example (e.g. "Rating: 3").
    3. <Task>: The input template.

    **Output format:** Workers must output ONLY a rating 1-5 (e.g. "Rating: 4" or just "4").
    No reasoning or explanation. Your few-shot examples MUST use this format:
    Example:
    Review: [text]
    Rating: [1-5]

    ## What You Can Modify
    1. <DynamicRules>: REFINE existing rules, MERGE near-duplicates, ADD only when
       no existing rule covers the error pattern.
    2. <FewShotExamples>: ADD, replace, or reorder examples.
       - Use the provided **Error Examples** (in artifacts) to create new Few-Shot examples.
       - Replace least effective examples with these new "hard" cases.
       - Each example ends with a single line: Rating: [1-5].
    3. Do NOT change <BaseGuidelines> or <Task>. These sections are frozen.

    ## CRITICAL: Compact Rule Management (MERGE-FIRST approach)
    This prompt is part of an active learning loop. Prompt length directly hurts
    fitness through length_penalty and wastes API budget. Follow MERGE-FIRST:

    **Before adding ANY new rule, search the existing <DynamicRules> for a rule
    that already covers a similar case.** If found:
    - REFINE that existing rule to also cover the new error pattern.
    - Do NOT add a separate rule.

    **Merge truly redundant rules.** If two rules describe essentially the same
    signal (e.g., both say "minor complaints but overall positive → 4"), combine
    them into one concise rule. Only merge rules that are genuinely near-identical
    in meaning — do NOT aggressively prune rules that address distinct concepts.

    **Hard budget: aim for 25-40 rules total.** If the prompt already has ≥40
    rules, your FIRST action must be to merge the most redundant pairs before
    adding anything new.

    **MANDATORY: cover ALL 5 rating categories.** The <DynamicRules> section
    MUST contain at least 2 rules for EACH star level (1, 2, 3, 4, 5).
    If the RULE COVERAGE WARNING in the artifacts shows missing categories,
    add rules for those categories BEFORE doing anything else.

    **Prioritize error patterns.** When the Evaluation Artifacts show
    systematic errors (e.g., gold=3 predicted as 4), first check whether an
    existing rule already addresses this boundary. If yes, refine it.
    If no existing rule covers this case, add ONE targeted boundary rule.

    ## Error Feedback (Evaluation Artifacts)
    Each evaluation provides concrete examples:
    - ERROR DISTRIBUTION: which gold->predicted pairs are most frequent.
    - TOP CONFUSION PAIRS: top mistake types with up to 2 concrete examples each.
    - MISCLASSIFIED EXAMPLES: review text, gold rating, predicted rating,
      per-worker votes, and disagreement score.
    - BORDERLINE EXAMPLES: correct prediction but workers disagreed.
    - RULE COVERAGE: which rating categories have rules in DynamicRules
      and which are MISSING — add rules for missing categories first.
    - FEW-SHOT BALANCE AUDIT: counts per rating in <FewShotExamples>; fix skew.
    Use these to identify systematic failure patterns and craft targeted
    rule refinements or select better few-shot examples.

    ## FewShotExamples Management
    - MUST include at least one example for EACH rating level (1-5).
    - Do NOT remove an example if it is the only one for its rating level.
    - Prioritize commonly confused rating pairs (4 vs 5, 2 vs 3).
    - **Smart Few-Shot:** If the artifacts show a specific error type (e.g., sarcasm failed),
      create a NEW few-shot example from that specific error case with the correct rating.
    - Aim for 7-10 diverse examples total. Do NOT exceed 12 examples.

    ## How Evaluation Works
    1. The {review} placeholder is replaced with the actual review text.
    2. The prompt is sent to each of the 3 worker models.
    3. Each worker responds with a single rating 1-5.
    4. The rating is extracted and the majority vote becomes the final prediction.

    ## Metrics & Fitness (what \"good\" means)
    During evolution, each candidate prompt is evaluated on a fixed active batch
    of Hard+Anchor examples using an ensemble of 3 workers. From these results
    we compute:
    - R_global: overall accuracy on the batch.
    - R_worst: accuracy on the worst user group (fairness metric).
    - Acc_Hard: accuracy on Hard examples (either misclassified before or with
      high worker disagreement).
    - Acc_Anchor: accuracy on Anchor examples (easy, stable cases).
    - mean_kappa: mean quadratic weighted Cohen's kappa between workers.

    The main fitness used for selection is:
      fitness = 0.5 * Acc_Hard + 0.3 * Acc_Anchor + 0.2 * kappa_Hard - length_penalty
    where kappa_Hard is inter-worker agreement on the Hard subset, and
    length_penalty grows with prompt length above ~2000 tokens.
    **Shorter prompts with the same accuracy always win.** Your goal is to
    maximize combined fitness while keeping the prompt as compact as possible.

    ## Output Format
    First, output a brief <mutation_log> block (3-5 lines) explaining what you
    changed and why (which rules merged, which added, which refined). Then output
    the complete prompt inside a ```text code fence.

    Example structure of your response:
    <mutation_log>
    - Merged rules 4-star "minor flaw" and "small complaint" into one.
    - Refined 3-star boundary rule to cover sarcasm edge case from error #2.
    - Replaced few-shot example #5 with misclassified review (gold=2).
    </mutation_log>
    ```text
    <System>
    ...full prompt here...
    </Task>
    ```

    ## Best Practices
    1. REFINE existing rules based on error artifacts before adding new ones.
    2. MERGE near-duplicate rules to stay compact (25-40 rules target).
    3. Use clear, generalizing rules (not rules for one specific review).
    4. Ensure DynamicRules covers ALL 5 rating levels with at least 2 rules each.
    5. Ensure FewShotExamples covers ALL 5 rating levels with diverse review styles.
    6. Preserve logic that correctly handles easy (Anchor) examples to avoid regression.

database:
  population_size: 30
  archive_size: 500
  num_islands: 1
  feature_dimensions: ["prompt_length", "Acc_Hard"]
  feature_bins: 5
  elite_selection_ratio: 0.4
  exploration_ratio: 0.3
  exploitation_ratio: 0.3

evaluator:
  model: "deepseek-chat-v3"  # primary model for single-model eval; when null, use workers ensemble
  timeout: 1800
  max_retries: 3
  parallel_evaluations: 1
  cascade_evaluation: false

generalization:
  gap_threshold: 0.10
  gap_penalty: 0.50

evolution_trace:
  enabled: true
  format: "jsonl"
  include_code: true
  include_prompts: true
  output_path: ""
  buffer_size: 1
  compress: false

# OpenRouter workers for ensemble evaluation
worker_defaults:
  api_base: "https://openrouter.ai/api/v1"
  temperature: 0.1
  max_tokens: 64
  timeout: 60
  max_retries: 3
  max_parallel: 15

workers:
  - name: "deepseek-chat-v3"
  - name: "gemma3-27b"
  - name: "gpt-4o-mini"

# Active learning pool management.
# uncertainty_threshold: disagreement_score threshold for Hard classification.
#   0.0 = any disagreement counts; 0.25 = at least ~1 star average spread.
# batch_size: size of the active batch used for evolution.
# hard_ratio: fraction of batch reserved for Hard examples.
# expansion_trigger: when Hard count drops to this or below, expand pool from Unseen.
# Per-cycle test metrics go to active_loop_log.json for graphs; AL decisions use train+val only.
active_learning:
  uncertainty_threshold: 0.0
  batch_size: 80
  hard_ratio: 0.7
  expansion_trigger: 15
  soft_expansion_patience: 3      # Cycles without val improvement to trigger expansion
  soft_expansion_min_delta: 0.02  # Minimum val_combined_score improvement required
  seen_reeval_interval: 3         # Re-evaluate all Seen examples every N AL cycles (0 = off)
  refresh_per_cycle: 10           # Promote N Unseen→Seen/cycle; each is scored → Hard or Anchor (0 = off)
  consolidation_gate_delta: 0.02  # Reject consolidated prompt if val score drops more than this
dataset:
  config_path: "dataset.yaml"
  max_samples: null
  max_samples_train: null
  max_samples_val: null
  max_samples_test: null
  max_train_users: 25
  max_val_users: 15

prompt_path: "initial_prompt.txt"
output_dir: "results"
