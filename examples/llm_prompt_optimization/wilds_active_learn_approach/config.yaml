max_iterations: 100
checkpoint_interval: 10
log_level: "INFO"
diff_based_evolution: false
max_code_length: 10000
language: "text"

# OpenRouter: Evolution model (DeepSeek R1 for reasoning)
llm:
  api_base: "https://openrouter.ai/api/v1"
  models:
    - name: "deepseek/deepseek-r1"
      weight: 1.0
  temperature: 0.8
  max_tokens: 8192
  timeout: 240
  retries: 3

prompt:
  template_dir: "../wilds_experiment/templates"
  num_top_programs: 5
  num_diverse_programs: 3
  include_artifacts: true
  system_message: |
    You are an expert at creating effective prompts for ensemble sentiment classification.
    Your goal is to evolve prompts that maximize accuracy for Home and Kitchen
    product reviews (ratings 1-5) when using a 3-model voting ensemble.

    ## Task Overview
    Your evolved prompts are sent to three LLM workers (DeepSeek V3, Gemma3-27B,
    GPT-4o-mini). Each worker classifies a product review into 1-5 stars.
    The majority vote is the final prediction.

    ## What You Can Modify
    1. <DynamicRules>: ADD new rules or REFINE existing rule wording.
    2. <FewShotExamples>: ADD, replace, or reorder examples.
    3. Do NOT change <BaseGuidelines> or <Task>. These sections are frozen.

    ## CRITICAL: Active Learning Rule Management
    This is an ACTIVE LEARNING system. The rule set must GROW over cycles,
    not shrink. Follow these principles strictly:

    **NEVER DELETE existing rules.** If a rule exists, it was added because it
    solved a real classification problem. Deleting it will cause regression on
    those examples in future cycles. You may only:
    - ADD a new rule to address a new error pattern
    - REFINE the wording of an existing rule to make it clearer
    - MERGE two very similar rules into one that covers both cases

    **MANDATORY: cover ALL 5 rating categories.** The <DynamicRules> section
    MUST contain at least 2 rules for EACH star level (1, 2, 3, 4, 5).
    If the RULE COVERAGE WARNING in the artifacts shows missing categories,
    your PRIMARY task is to add rules for those categories BEFORE doing
    anything else.

    **Prioritize error patterns.** When the Evaluation Artifacts show
    systematic errors (e.g., gold=3 predicted as 4), add a SPECIFIC new
    rule that disambiguates this boundary. Do NOT replace existing rules —
    add the new rule alongside them.

    ## Error Feedback (Evaluation Artifacts)
    Each evaluation provides concrete examples:
    - ERROR DISTRIBUTION: which gold->predicted pairs are most frequent.
    - MISCLASSIFIED EXAMPLES: review text, gold rating, predicted rating,
      per-worker votes, and disagreement score.
    - BORDERLINE EXAMPLES: correct prediction but workers disagreed.
    - RULE COVERAGE: which rating categories have rules in DynamicRules
      and which are MISSING — add rules for missing categories first.
    Use these to identify systematic failure patterns and craft targeted
    new rules or select better few-shot examples.

    ## FewShotExamples Management
    - MUST include at least one example for EACH rating level (1-5).
    - Do NOT remove an example if it is the only one for its rating level.
    - Prioritize commonly confused rating pairs (4 vs 5, 2 vs 3).
    - You may use misclassified reviews from the artifacts as new few-shot
      demonstrations if they are instructive.
    - Aim for 7-10 diverse examples total.

    ## How Evaluation Works
    1. The {review} placeholder is replaced with the actual review text.
    2. The prompt is sent to each of the 3 worker models.
    3. Each worker responds with a rating (1-5).
    4. The majority vote becomes the final prediction.

    ## Fitness Function
      fitness = 0.5 * Acc_Hard + 0.3 * Acc_Anchor + 0.2 * kappa_Hard - length_penalty
    - Acc_Hard: accuracy on Hard examples (misclassified or disagreed).
    - Acc_Anchor: accuracy on Anchor examples (correct and unanimous).
    - kappa_Hard: quadratic weighted Cohen's Kappa among workers on Hard set.
    - length_penalty: 0.01 per 100 extra tokens above 2000 estimated tokens.

    ## Best Practices
    1. GROW the rule set: add new rules based on error artifacts; never delete working rules.
    2. Use clear, generalizing rules (not rules for one specific review).
    3. Ensure DynamicRules covers ALL 5 rating levels with at least 2 rules each.
    4. Ensure FewShotExamples covers ALL 5 rating levels with diverse review styles.
    5. Preserve logic that correctly handles easy (Anchor) examples to avoid regression.
    6. When in doubt, ADD a new rule rather than modifying or removing an existing one.

database:
  population_size: 30
  archive_size: 500
  num_islands: 1
  feature_dimensions: ["prompt_length", "Acc_Hard"]
  feature_bins: 5
  elite_selection_ratio: 0.4
  exploration_ratio: 0.3
  exploitation_ratio: 0.3

evaluator:
  timeout: 1800
  max_retries: 3
  parallel_evaluations: 1
  cascade_evaluation: false

generalization:
  gap_threshold: 0.10
  gap_penalty: 0.50

evolution_trace:
  enabled: true
  format: "jsonl"
  include_code: true
  include_prompts: true
  output_path: ""
  buffer_size: 1
  compress: false

# OpenRouter workers for ensemble evaluation
worker_defaults:
  api_base: "https://openrouter.ai/api/v1"
  temperature: 0.1
  max_tokens: 64
  timeout: 60
  max_retries: 3
  max_parallel: 15

workers:
  - name: "deepseek-chat-v3"
  - name: "gemma3-27b"
  - name: "gpt-4o-mini"

# Active learning pool management.
# uncertainty_threshold: disagreement_score threshold for Hard classification.
#   0.0 = any disagreement counts; 0.25 = at least ~1 star average spread.
# batch_size: size of the active batch used for evolution.
# hard_ratio: fraction of batch reserved for Hard examples.
# expansion_trigger: when Hard count drops to this or below, expand pool from Unseen.
active_learning:
  uncertainty_threshold: 0.0
  batch_size: 80
  hard_ratio: 0.7
  expansion_trigger: 15

dataset:
  config_path: "dataset.yaml"
  max_samples: null
  max_samples_train: null
  max_samples_val: null
  max_samples_test: null
  max_train_users: 25
  max_val_users: 15

prompt_path: "initial_prompt.txt"
output_dir: "results"
