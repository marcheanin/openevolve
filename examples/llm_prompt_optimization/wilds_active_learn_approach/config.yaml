max_iterations: 100
checkpoint_interval: 10
log_level: "INFO"
diff_based_evolution: false
max_code_length: 9000
language: "text"

# OpenRouter: Evolution model (DeepSeek R1 for reasoning)
llm:
  api_base: "https://openrouter.ai/api/v1"
  models:
    - name: "deepseek/deepseek-r1"
      weight: 1.0
  temperature: 0.8
  max_tokens: 8192
  timeout: 240
  retries: 3

prompt:
  template_dir: null
  num_top_programs: 5
  num_diverse_programs: 3
  include_artifacts: true
  system_message: |
    You are an expert at creating effective prompts for ensemble sentiment classification.
    Your goal is to evolve prompts that maximize accuracy for Home and Kitchen
    product reviews (ratings 1-5) when using a 3-model voting ensemble.

    ## Task Overview
    Your evolved prompts are sent to three LLM workers (DeepSeek V3, Gemma3-27B,
    GPT-4o-mini). Each worker classifies a product review into 1-5 stars.
    The majority vote is the final prediction.

    ## Prompt Structure & Roles (read carefully)
    The prompt MUST use XML tags for structure:
    1. <System>: Contains <Role>, <BaseGuidelines>, <DynamicRules>.
    2. <FewShotExamples>: Examples with a single rating per example (e.g. "Rating: 3").
    3. <Task>: The input template.

    **BaseGuidelines** = stable, proven rules (scale, output format, task framing).
    Workers treat this as the PRIMARY anchor. During evolution you MUST NOT edit
    <BaseGuidelines>; it is updated only in the consolidation step between cycles.

    **DynamicRules** = experimental scratchpad for edge cases and new patterns.
    It must stay small and non-redundant. Do NOT restate what is already in
    BaseGuidelines—only add genuinely new disambiguations.

    **Output format:** Workers must output ONLY a rating 1-5 (e.g. "Rating: 4" or just "4").
    No reasoning or explanation. Your few-shot examples MUST use this format:
    Example:
    Review: [text]
    Rating: [1-5]

    ## What You Can Modify
    1. <DynamicRules>: REFINE, MERGE, or (sparingly) add rules under the hard cap below.
    2. <FewShotExamples>: ADD, replace, or reorder examples.
       - Use **Error Examples** (artifacts) to replace weak examples with hard cases.
       - Each example ends with a single line: Rating: [1-5].
    3. Do NOT change <BaseGuidelines> or <Task>. These sections are frozen during evolution.

    ## CRITICAL: Merge-first DynamicRules (anti-bloat)
    **Hard cap:** <DynamicRules> must contain **at most 15 rules** (count each distinct
    bullet or numbered line as one rule). If you already have 15 rules, you MUST merge
    or remove at least two overlapping or weak rules **before** you add anything new.

    **Merge-first policy (mandatory order):**
    1. Before adding a new rule, check whether an existing DynamicRules line already
       covers the same pattern. If yes, **REFINE that line** instead of appending a duplicate.
    2. If two rules say almost the same thing, **merge them into one** clearer rule.
    3. Delete rules that only repeat BaseGuidelines (e.g. generic star definitions already
       implied by BaseGuidelines) unless they add a concrete boundary case.
    4. Only when no existing rule can be extended should you add a **single** new rule—
       and only if you are under the 15-rule cap or you merged first.

    **Coverage:** DynamicRules should still help all five star levels. Aim for at least
    two rules per level **within the 15-rule budget** by merging, not by listing 50 bullets.
    If RULE COVERAGE in artifacts shows missing categories, fix coverage by **refining or
    merging** existing lines to cover those levels; do not explode the count.

    **Error patterns:** For systematic gold→predicted errors, prefer **tightening one
    existing rule** (e.g. 4 vs 5 boundary) over stacking many near-duplicate bullets.

    ## Error Feedback (Evaluation Artifacts)
    - ERROR DISTRIBUTION, TOP CONFUSION PAIRS, MISCLASSIFIED EXAMPLES, BORDERLINE EXAMPLES.
    - FEW-SHOT BALANCE AUDIT, RULE COVERAGE.
    Use them to refine rules and few-shots without growing DynamicRules past the cap.

    ## FewShotExamples Management
    - At least one example per rating (1-5); do not remove the only example for a level.
    - Prioritize confused pairs (4 vs 5, 2 vs 3). Prefer replacing redundant 5-star
      examples with under-represented levels when the audit warns of imbalance.
    - Aim for 7-10 diverse examples total.

    ## How Evaluation Works
    1. The {review} placeholder is replaced with the actual review text.
    2. The prompt is sent to each of the 3 worker models.
    3. Each worker responds with a single rating 1-5.
    4. The majority vote becomes the final prediction.

    ## Metrics & Fitness (what \"good\" means)
    During evolution, each candidate prompt is evaluated on a fixed active batch
    of Hard+Anchor examples using an ensemble of 3 workers. From these results
    we compute:
    - R_global, R_worst, Acc_Hard, Acc_Anchor, mean_kappa.

    The main fitness is:
      fitness = 0.5 * Acc_Hard + 0.3 * Acc_Anchor + 0.2 * kappa_Hard - length_penalty
    where length_penalty grows with prompt length above ~2000 tokens. **Maximize fitness**
    by improving Acc_Hard and kappa_Hard while keeping Acc_Anchor high and the **entire
    prompt short**—merging rules directly helps fitness.

    ## Best Practices
    1. Merge similar rules first; add new rules only when necessary and under the cap.
    2. Use clear, generalizing rules (not one-off wording for a single review).
    3. Keep DynamicRules at or below 15 rules; never exceed 15 without merging first.
    4. Keep FewShotExamples balanced across 1-5 where artifacts flag imbalance.
    5. Preserve behavior on easy (Anchor) examples to avoid regression.
    6. When unsure whether to add or merge: **merge or refine**; do not blindly append.

database:
  population_size: 30
  archive_size: 500
  num_islands: 1
  feature_dimensions: ["prompt_length", "Acc_Hard"]
  feature_bins: 5
  elite_selection_ratio: 0.4
  exploration_ratio: 0.3
  exploitation_ratio: 0.3

evaluator:
  model: "deepseek-chat-v3"  # primary model for single-model eval; when null, use workers ensemble
  timeout: 1800
  max_retries: 3
  parallel_evaluations: 1
  cascade_evaluation: false

generalization:
  gap_threshold: 0.10
  gap_penalty: 0.50

evolution_trace:
  enabled: true
  format: "jsonl"
  include_code: true
  include_prompts: true
  output_path: ""
  buffer_size: 1
  compress: false

# OpenRouter workers for ensemble evaluation
worker_defaults:
  api_base: "https://openrouter.ai/api/v1"
  temperature: 0.1
  max_tokens: 64
  timeout: 60
  max_retries: 3
  max_parallel: 15

workers:
  - name: "deepseek-chat-v3"
  - name: "gemma3-27b"
  - name: "gpt-4o-mini"

# Active learning pool management.
# uncertainty_threshold: disagreement_score threshold for Hard classification.
#   0.0 = any disagreement counts; 0.25 = at least ~1 star average spread.
# batch_size: size of the active batch used for evolution.
# hard_ratio: fraction of batch reserved for Hard examples.
# expansion_trigger: when Hard count drops to this or below, expand pool from Unseen.
active_learning:
  uncertainty_threshold: 0.0
  batch_size: 80
  hard_ratio: 0.7
  expansion_trigger: 15
  soft_expansion_patience: 3      # Cycles without val improvement to trigger expansion
  soft_expansion_min_delta: 0.02  # Minimum val_combined_score improvement required
  seen_reeval_interval: 3         # Re-evaluate all Seen examples every N AL cycles (0 = off)
  refresh_per_cycle: 10           # Add N Unseen examples to Hard pool each cycle (0 = off)
  consolidation_gate_delta: 0.02  # Reject consolidated prompt if val score drops more than this
dataset:
  config_path: "dataset.yaml"
  max_samples: null
  max_samples_train: null
  max_samples_val: null
  max_samples_test: null
  max_train_users: 25
  max_val_users: 15

prompt_path: "initial_prompt.txt"
output_dir: "results"
