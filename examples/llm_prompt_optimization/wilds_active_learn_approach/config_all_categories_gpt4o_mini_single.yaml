# Single-worker (1 LLM) evaluation config for all-categories runs.
# Use with run_full_test.py to get full uncapped test metrics for a single model.
#
# Example:
#   python run_full_test.py --prompt initial_prompt_all_categories.txt --config config_all_categories_gpt4o_mini_single.yaml --results-dir results_single_gpt4o_mini --max-parallel 10
#
# This copies config_all_categories.yaml but restricts workers to a single model:
#   - openai/gpt-4o-mini

max_iterations: 500
checkpoint_interval: 10
log_level: "INFO"
diff_based_evolution: false
max_code_length: 7500
language: "text"
early_stopping_patience: 5
early_stopping_metric: "combined_score"
convergence_threshold: 0.001

llm:
  api_base: "https://openrouter.ai/api/v1"
  models:
    - name: "google/gemini-2.5-pro"
      weight: 1.0
  temperature: 0.6
  max_tokens: 8192
  timeout: 300
  retries: 5

prompt:
  template_dir: null
  num_top_programs: 5
  num_diverse_programs: 3
  include_artifacts: true
  system_message: |
    You are evolving a classification prompt for Amazon product reviews across
    all categories (1-5 stars). A single LLM worker (GPT-4o-mini) receives your prompt
    and outputs a single rating.

    ## What you're working with

    The prompt has XML structure:
      <System> → <Role>, <BaseGuidelines>, <DynamicRules>
      <FewShotExamples> → review/rating pairs
      <Task> → the {review} placeholder

    Keep <Task> unchanged. Everything else is yours to reshape: rewrite
    rules, reorganize sections, add or remove examples, change wording,
    restructure <DynamicRules> however you see fit. You may also refine
    <BaseGuidelines> if you find a wording that helps workers classify
    more accurately — but keep the core intent (scale, output format).

    Worker outputs ONLY a rating (e.g. "Rating: 4" or "4"). Few-shot examples
    must end with a single "Rating: N" line.

database:
  population_size: 30
  archive_size: 500
  num_islands: 1
  feature_dimensions: ["prompt_length", "Acc_Hard"]
  feature_bins: 5
  elite_selection_ratio: 0.4
  exploration_ratio: 0.3
  exploitation_ratio: 0.3

evaluator:
  model: null  # null => use workers ensemble; here it's 1 worker
  timeout: 1800
  max_retries: 3
  parallel_evaluations: 1
  cascade_evaluation: false

generalization:
  gap_threshold: 0.10
  gap_penalty: 0.50

evolution_trace:
  enabled: true
  format: "jsonl"
  include_code: true
  include_prompts: true
  output_path: ""
  buffer_size: 1
  compress: false

worker_defaults:
  api_base: "https://openrouter.ai/api/v1"
  temperature: 0.0
  max_tokens: 64
  timeout: 75
  max_retries: 4
  max_parallel: 10

workers:
  - name: "openai/gpt-4o-mini"

dataset:
  config_path: "dataset_all_categories.yaml"
  # Keep these aligned with config_all_categories.yaml (fast, representative splits for AL).
  max_train_users: 25
  max_val_users: 15
  max_reviews_per_user: 15
  stratify_users: true

active_learning:
  uncertainty_threshold: 0.0
  batch_size: 80
  hard_ratio: 0.7
  synthetic_fewshot:
    enabled: true
    mode: inject_as_hint
    mutator_lock_fewshot: false
    n_examples: 8
    n_boundary_pairs: 4
    model: null
    temperature: 0.7
    max_tokens: 4096
    max_retries: 2
  min_hard_batch_ratio: 0.55
  expansion_trigger: 15
  soft_expansion_patience: 3
  soft_expansion_min_delta: 0.02
  soft_expansion_skip_near_best: 0.005
  seen_reeval_interval: 3
  refresh_per_cycle: 10
  generalization_gap_warn_threshold: 0.03
  generalization_gap_stop_threshold: 0.08
  generalization_gap_stop_patience: 2
