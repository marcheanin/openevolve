# WILDS Amazon Reviews dataset configuration (Home and Kitchen category)
dataset_name: "wilds_amazon"
dataset_type: "wilds"
input_field: "text"
target_field: "label"

# Category filter - Home_and_Kitchen
category: "Home_and_Kitchen"
category_id: 24

# WILDS root_dir: parent of the inner "amazon_v2.1" folder (manual copy at repo root).
# Resolves to: <AlphaEvolveProject>/amazon_v2.1 → contains amazon_v2.1/reviews.csv, splits/, RELEASE_v2.1.txt
data_root: "../../../../amazon_v2.1"
dataset_download: false

# Dataset splitting
train_ratio: 0.7
validation_ratio: 0.15
test_ratio: 0.15
split_seed: 42
user_disjoint: true

# Stratification
stratify_by_class: true

# Filter: minimum reviews per user (applied within each split)
min_user_reviews: 10
