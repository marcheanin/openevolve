# Same as dataset.yaml but uses the full WILDS Amazon *train* subset (all product categories).
# Referenced only from config_all_categories.yaml (keeps default dataset.yaml unchanged).
#
# Preprocessed cache filename uses tag `all_v2` (includes per-review product category for stratified caps).
# Remove old `*_catall.pkl` caches if you still have them from a previous code version.

dataset_name: "wilds_amazon"
dataset_type: "wilds"
input_field: "text"
target_field: "label"

use_all_categories: true

# Ignored when use_all_categories is true (kept for documentation / switching back).
category: "Home_and_Kitchen"
category_id: 24

# Same layout as dataset.yaml — manual bundle at <repo>/amazon_v2.1/amazon_v2.1/
data_root: "../../../../amazon_v2.1"
dataset_download: false

train_ratio: 0.7
validation_ratio: 0.15
test_ratio: 0.15
split_seed: 42
user_disjoint: true

stratify_by_class: true

min_user_reviews: 10
